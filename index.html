            color: #0c5460;

            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);

                '三首恶龙': 'hydreigon',
                '乌鸦头头': 'corviknight',
                '布莉姆温': 'hatterene',
                '象牙猪': 'mamoswine',
                '音波龙': 'noivern',
                '月桂叶': 'bayleef',
                '火岩鼠': 'quilava',
                '蓝鳄': 'croconaw',
                '多龙奇': 'dracozolt',
                '老翁龙': 'dracovish',
                '电击兽': 'electabuzz',
                '阿罗拉六尾': 'alolan-vulpix',
                '双首暴龙': ' Zweilous',
                '心蝙蝠': 'swoobat',
                '豪力': 'machoke',
                '黑暗鸦': 'murkrow',
                '提布莉姆': 'hattrem',
                '长毛猪': 'piloswine',
                '火箭雀': 'fletchinder',
                '小箭雀': 'fletchling',
                '嗡蝠': 'noibat',
                '菊草叶': 'chikorita',
                '火球鼠': 'cyndaquil',
                '小锯鳄': 'totodile',
                '多龙梅西亚': 'dracovish',
                '来悲茶': 'sinistea',
                '电击怪': 'electrike',
                '毛辫羊': 'wooloo',
                '单首龙': 'deino',
                '滚滚蝙蝠': 'woobat',
                '腕力': 'machop',
                '迷布莉姆': 'hatenna',
                '小山猪': 'swinub'
            };

            // 加载宝可梦图片和详细信息
            for (const card of officialCards) {
                try {
                    // 使用映射表获取PokeAPI名称
                    const pokemonName = pokemonNameMap[card.name] || card.name.toLowerCase().replace(/\s+/g, '-');
                    const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonName}`);
                    
                    if (response.ok) {
                        const pokemon = await response.json();
                        
                        // 获取宝可梦物种信息（用于描述）
                        const speciesResponse = await fetch(pokemon.species.url);
                        const species = await speciesResponse.json();
                        
                        // 找到中文描述
                        let description = card.description;
                        const chineseFlavorText = species.flavor_text_entries.find(entry => 
                            entry.language.name === 'zh-Hans'
                        );
                        
                        if (chineseFlavorText) {
                            description = chineseFlavorText.flavor_text.replace(/\n/g, ' ');
                        }

                        // 更新卡片数据
                        card.type = pokemon.types.map(type => type.type.name).join('/');
                        card.hp = Math.floor(pokemon.stats[0].base_stat * 1.5);
                        card.attack = pokemon.stats[1].base_stat;
                        card.defense = pokemon.stats[2].base_stat;
                        card.description = description;
                        card.image = pokemon.sprites.other['official-artwork'].front_default;
                    } else {
                        // 如果API请求失败，使用默认图片
                        card.image = `https://via.placeholder.com/200?text=${encodeURIComponent(card.name)}`;
                        // 确保其他属性有默认值
                        card.hp = card.hp || 100;
                        card.attack = card.attack || 50;
                        card.defense = card.defense || 50;
                    }
                } catch (error) {
                    console.error(`加载宝可梦 ${card.name} 失败:`, error);
                    // 使用默认图片
                    card.image = `https://via.placeholder.com/200?text=${encodeURIComponent(card.name)}`;
                    // 确保其他属性有默认值
                    card.hp = card.hp || 100;
                    card.attack = card.attack || 50;
                    card.defense = card.defense || 50;
                }
                
                pokemonCards.push(card);
            }
        }

        // 渲染卡片
        function renderCards() {
            let filteredCards = pokemonCards;
            
            // 按弹数过滤
            if (currentSet !== 'all') {
                filteredCards = filteredCards.filter(card => card.set === currentSet);
            }
            
            // 按搜索词过滤
            if (searchTerm) {
                filteredCards = filteredCards.filter(card => 
                    card.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            // 清空网格
            cardGrid.innerHTML = '';
            
            if (filteredCards.length === 0) {
                cardGrid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #666;">没有找到匹配的卡片</div>';
                return;
            }

            // 渲染卡片
            filteredCards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.id = card.id;
                
                // 根据星级设置颜色
                const starColor = getStarColor(card.star);
                
                cardElement.innerHTML = `
                    <div class="card-image">
                        <img src="${card.image}" alt="${card.name}">
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${card.name}</h3>
                        <p class="card-info">属性: ${card.type}</p>
                        <p class="card-info">HP: ${card.hp}</p>
                        <span class="card-rarity" style="background-color: ${starColor}; color: white;">★${card.star}</span>
                    </div>
                `;
                
                cardElement.addEventListener('click', () => showPokemonDetail(card));
                cardGrid.appendChild(cardElement);
            });
        }

        // 根据星级获取颜色
        function getStarColor(star) {
            const colorMap = {
                2: '#9e9e9e', // 灰色
                3: '#4caf50', // 绿色
                4: '#2196f3', // 蓝色
                5: '#ff9800', // 橙色
                6: '#e91e63'  // 粉色
            };
            return colorMap[star] || '#9e9e9e';
        }

        // 显示宝可梦详细信息
        function showPokemonDetail(pokemon) {
            // 根据星级设置颜色
            const starColor = getStarColor(pokemon.star);
            
            pokemonDetail.innerHTML = `
                <div class="pokemon-image">
                    <img src="${pokemon.image}" alt="${pokemon.name}">
                </div>
                <div class="pokemon-info">
                    <h2 class="pokemon-name">${pokemon.name}</h2>
                    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
                        <span style="background-color: ${starColor}; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold;">★${pokemon.star}</span>
                        <span style="background-color: #f0f0f0; padding: 5px 15px; border-radius: 20px;">${pokemon.id}</span>
                        <span style="background-color: #f0f0f0; padding: 5px 15px; border-radius: 20px;">${pokemon.category}</span>
                    </div>
                    <div class="pokemon-stats">
                        <div class="stat-item">
                            <div class="stat-label">属性</div>
                            <div class="stat-value">${pokemon.type}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">HP</div>
                            <div class="stat-value">${pokemon.hp}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">攻击</div>
                            <div class="stat-value">${pokemon.attack}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">防御</div>
                            <div class="stat-value">${pokemon.defense}</div>
                        </div>
                    </div>
                    <div class="pokemon-description">
                        <strong>描述:</strong> ${pokemon.description}
                    </div>
                </div>
            `;
            modal.style.display = 'block';
        }

        // 事件监听器
        searchBox.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderCards();
        });
        
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                navBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSet = btn.dataset.set;
                renderCards();
            });
        });
        
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // 启动应用
        init();
    </script>
</body>
</html>
