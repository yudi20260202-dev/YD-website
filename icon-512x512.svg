<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="ballGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cccccc;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="topGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a4a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="bottomGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="buttonGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- 球体背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#ballGradient)" stroke="#333" stroke-width="8"/>
  
  <!-- 上半部分 -->
  <path d="M 16 256 A 240 240 0 0 1 496 256" fill="url(#topGradient)" stroke="#333" stroke-width="4"/>
  
  <!-- 下半部分 -->
  <path d="M 16 256 A 240 240 0 0 0 496 256" fill="url(#bottomGradient)" stroke="#333" stroke-width="4"/>
  
  <!-- 中间分割线 -->
  <line x1="16" y1="256" x2="496" y2="256" stroke="#333" stroke-width="8"/>
  
  <!-- 按钮外圈 -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#333" stroke-width="4"/>
  
  <!-- 按钮内圈 -->
  <circle cx="256" cy="256" r="50" fill="url(#buttonGradient)" stroke="#333" stroke-width="3"/>
  
  <!-- 按钮中心 -->
  <circle cx="256" cy="256" r="35" fill="#4a4a4a" stroke="#333" stroke-width="2"/>
  
  <!-- 按钮高光 -->
  <ellipse cx="246" cy="246" rx="15" ry="10" fill="rgba(255,255,255,0.3)" transform="rotate(-45 246 246)"/>
  
  <!-- 球体高光 -->
  <ellipse cx="200" cy="180" rx="40" ry="25" fill="rgba(255,255,255,0.2)" transform="rotate(-30 200 180)"/>
</svg>